# cargo-deny policy for Solarix — see docs/adr/0002-ci-pipeline.md for rationale.
#
# Subsection gating (matches CI `security` job):
#   [advisories]  → hard gate (blocks the job on any advisory)
#   [bans]        → hard gate
#   [sources]     → hard gate
#   [licenses]    → fail-soft for Sprint 5 (warn only; Solana ecosystem has
#                   weird license metadata and a hard gate would red Day-1 CI).
#                   Revisit post-bounty.

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

[licenses]
# Fail-soft for Sprint 5 — see D5 in ADR-0002. `allow` lists the licenses we
# explicitly accept; anything not on the list is downgraded to a warning via
# `unlicensed = "warn"` rather than a hard failure.
unused-allowed-license = "warn"
confidence-threshold = 0.8
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "MPL-2.0",
  "Zlib",
  "CC0-1.0",
  "OpenSSL",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
# Deliberately empty. Do NOT add `{ name = "openssl", ... }` — verified 2026-04-07
# via `cargo tree --target x86_64-unknown-linux-gnu` that `openssl-sys` 0.9.x IS
# in the Linux dep tree via sqlx `tls-native-tls` and reqwest default features.
# Banning it would red the security job on Day 1. The rustls migration is a
# separate story.
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# Deliberately empty. The project has zero git dependencies today
# (`chainparser` is commented out in Cargo.toml). If a future story reintroduces
# a git dep, that story extends this allowlist with the specific repo URL.
allow-git = []
